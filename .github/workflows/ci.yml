name: CI

on:
  push:
    branches: [ main, develop, 'claude/**' ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  # Code quality checks
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "::error::Code is not formatted. Run 'make fmt'"
            gofmt -s -l .
            exit 1
          fi

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Install golangci-lint
        # v2 line; pinned so CI matches the committed .golangci.yml (version: 2)
        # and the Makefile. Note the /v2 module path.
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0

      - name: Run golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run --timeout 5m ./...

  # Shell-script linting (the project ships operational shell, e.g.
  # docs/monitoring-timer.sh, that governs alerting).
  shellcheck:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck and bash -n
        run: |
          mapfile -t files < <(find . -name '*.sh' -not -path './.git/*')
          if [ "${#files[@]}" -eq 0 ]; then echo "no shell scripts"; exit 0; fi
          printf '%s\n' "${files[@]}"
          shellcheck "${files[@]}"
          for f in "${files[@]}"; do bash -n "$f"; done

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0

      - name: Run gosec
        run: $(go env GOPATH)/bin/gosec -quiet ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          $(go env GOPATH)/bin/govulncheck ./...

  # Unit tests with coverage
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    # GOTOOLCHAIN=local pins each matrix leg to its own Go version. Without it the
    # `toolchain go1.25.12` directive in go.mod makes GOTOOLCHAIN=auto silently
    # upgrade the floor leg, so it would never actually exercise the minimum version.
    env:
      GOTOOLCHAIN: local
    strategy:
      matrix:
        # Minimum supported version (go.mod `go` directive) and latest stable patch.
        go-version: ['1.25.0', '1.25.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run tests with race detector
        # 2m timeout provides margin for race detector overhead on slow CI runners
        run: go test -race -timeout 2m ./...

      - name: Run tests with coverage
        run: go test -race -timeout 2m -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        # Pinned to v4.6.0 commit SHA to prevent supply-chain attacks via moving tags.
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Check coverage threshold
        run: |
          coverage=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${coverage}%"
          # Note: 65% threshold accounts for CLI commands requiring root/interactive input
          # Internal packages maintain ~87% coverage; CLI packages have lower coverage
          # due to root privileges, interactive prompts, and network requirements
          if (( $(echo "$coverage < 65.0" | bc -l) )); then
            echo "::error::Coverage ${coverage}% is below 65% threshold"
            exit 1
          fi

  # Cross-compilation validation
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: 7
          - goos: linux
            goarch: arm
            goarm: 6
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Get version info
        id: version
        run: |
          echo "VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo 'dev')" >> $GITHUB_OUTPUT
          echo "COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo 'unknown')" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Build lyrebird CLI for ${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          CGO_ENABLED=0 go build -trimpath \
            -ldflags "-s -w -X main.Version=${{ steps.version.outputs.VERSION }} -X main.Commit=${{ steps.version.outputs.COMMIT }} -X main.BuildTime=${{ steps.version.outputs.BUILD_TIME }}" \
            -o bin/lyrebird-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }} \
            ./cmd/lyrebird

      - name: Build lyrebird-stream daemon for ${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          CGO_ENABLED=0 go build -trimpath \
            -ldflags "-s -w -X main.Version=${{ steps.version.outputs.VERSION }} -X main.Commit=${{ steps.version.outputs.COMMIT }} -X main.BuildTime=${{ steps.version.outputs.BUILD_TIME }}" \
            -o bin/lyrebird-stream-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }} \
            ./cmd/lyrebird-stream

      - name: Verify builds
        run: |
          ls -lh bin/
          # Verify binaries are not empty
          [ -s bin/lyrebird-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }} ] || exit 1
          [ -s bin/lyrebird-stream-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }} ] || exit 1
          # For amd64, verify binary can run (only works on native arch)
          if [ "${{ matrix.goarch }}" = "amd64" ]; then
            ./bin/lyrebird-${{ matrix.goos }}-${{ matrix.goarch }} version || ./bin/lyrebird-${{ matrix.goos }}-${{ matrix.goarch }} --version || echo "Version check skipped"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: bin/*
          retention-days: 7

  # Integration tests (requires self-hosted runner with USB devices)
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Only run on main branch or manual trigger (requires special hardware)
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: true

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run integration tests
        # ubuntu-latest has no USB audio hardware; tests guarded with t.Skip() or
        # the 'integration' build tag will not run.  This step verifies the
        # integration build compiles cleanly and that hardware-gated tests are
        # properly skipped.  Full integration testing requires a self-hosted
        # runner with physical USB audio devices attached.
        run: go test -v -race -tags=integration -timeout 5m ./...

      - name: Hardware-requirement notice
        if: always()
        run: |
          echo "NOTE: Full integration tests require a self-hosted runner with USB"
          echo "audio devices.  Tests on ubuntu-latest are skipped via t.Skip() or"
          echo "build constraints.  See docs/PEER_REVIEW.md CI-5 for details."

  # Hardware-free end-to-end tests: real MediaMTX + real ffmpeg (synthetic
  # audio), no USB microphone required. This exercises the actual streaming
  # integration and the MediaMTX API client against real wire-format responses.
  e2e:
    name: E2E (real MediaMTX + ffmpeg)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: true

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download MediaMTX
        env:
          MEDIAMTX_VERSION: v1.19.2
        run: |
          curl -fsSL -o /tmp/mediamtx.tar.gz \
            "https://github.com/bluenviron/mediamtx/releases/download/${MEDIAMTX_VERSION}/mediamtx_${MEDIAMTX_VERSION}_linux_amd64.tar.gz"
          mkdir -p /tmp/mediamtx
          tar -xzf /tmp/mediamtx.tar.gz -C /tmp/mediamtx
          echo "LYREBIRD_MEDIAMTX_BIN=/tmp/mediamtx/mediamtx" >> "$GITHUB_ENV"

      - name: Run E2E tests
        run: go test -tags e2e -count=1 -timeout 10m ./test/e2e/...

  # Release build (only on tags)
  release:
    name: Release Build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [quality, security, test, build]
    # Elevated permissions needed to create a GitHub Release and upload assets.
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: false

      - name: Organize binaries
        run: |
          mkdir -p bin
          find artifacts -type f -name 'lyrebird-*' -exec cp {} bin/ \;
          ls -lh bin/

      - name: Create checksums
        run: |
          cd bin
          sha256sum lyrebird-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            bin/lyrebird-* \
            bin/checksums.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            bin/lyrebird-*
            bin/checksums.txt
